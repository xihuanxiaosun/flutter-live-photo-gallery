name: live_photo_gallery
description: "iOS & Android media picker & preview plugin. Supports images, videos, Live Photo (iOS) and Motion Photo (Android)."
version: 1.0.0
homepage:

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  plugin:
    platforms:
      ios:
        pluginClass: LivePhotoGalleryPlugin
      android:
        package: com.newtrip.live_photo_gallery
        pluginClass: LivePhotoGalleryPlugin
