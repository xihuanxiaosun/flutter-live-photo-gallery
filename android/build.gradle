group 'com.newtrip.live_photo_gallery'
version '1.0'

buildscript {
    ext.kotlin_version = '1.9.22'
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath 'com.android.tools.build:gradle:8.1.0'
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
    }
}

// Flutter embedding 仓库（compileOnly 依赖所需）
allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url "https://storage.googleapis.com/download.flutter.io" }
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    // AGP 7.0+ 要求声明 namespace，避免 "Namespace not specified" 编译错误
    namespace 'com.newtrip.live_photo_gallery'
    compileSdk 34

    defaultConfig {
        minSdk 21
    }

    compileOptions {
        // 使用 Java 11，与 Kotlin 1.9 / Glide 4.16 / Material3 兼容性更好
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = "11"
    }

    testOptions {
        unitTests.returnDefaultValues = true  // Android framework 方法在 JVM 测试中返回默认值
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }
}

dependencies {
    // ⚠️ Flutter embedding 版本固定。若升级 Flutter SDK，需同步更新此版本号（对应 dart pub 中 flutter version）
    // 版本不匹配会导致运行时 NoSuchMethodError。建议改用 Flutter Gradle 插件（apply plugin: 'dev.flutter.flutter-gradle-plugin'）管理
    // 嵌入在 Flutter 工程时由 Flutter Gradle 插件自动提供；独立编译时回退到本地 jar
    if (project.hasProperty('flutter.sdk')) {
        compileOnly 'io.flutter:flutter_embedding_debug:1.0.0-3.27.0'
    } else {
        def flutterSdk = System.env.FLUTTER_ROOT ?: "${System.env.HOME}/Downloads/flutter"
        def flutterJar = "${flutterSdk}/bin/cache/artifacts/engine/android-x64/flutter.jar"
        compileOnly files(flutterJar)
    }

    // 图片加载：Glide 核心 + RecyclerView 预加载集成
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    implementation 'com.github.bumptech.glide:recyclerview-integration:4.16.0'

    // RecyclerView
    implementation 'androidx.recyclerview:recyclerview:1.3.2'

    // AppCompat（AppCompatActivity、localNightMode）
    implementation 'androidx.appcompat:appcompat:1.7.0'

    // AndroidX Lifecycle（lifecycleScope）
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.8.3'

    // Material 3 组件
    implementation 'com.google.android.material:material:1.12.0'

    // ViewPager2（预览横滑）
    implementation 'androidx.viewpager2:viewpager2:1.1.0'

    // 协程
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    // ExifInterface（XMP 元数据读取，Motion Photo 检测）
    implementation 'androidx.exifinterface:exifinterface:1.3.7'

    // Media3 ExoPlayer（内联视频播放，替代跳系统播放器）
    implementation 'androidx.media3:media3-exoplayer:1.3.1'
    implementation 'androidx.media3:media3-ui:1.3.1'

    // 图片裁剪（MavenCentral 可用坐标，避免 JitPack 依赖）
    implementation 'com.yalantis:ucrop:2.2.0-native'

    // 单元测试依赖
    testImplementation 'junit:junit:4.13.2'
    testImplementation 'org.mockito:mockito-core:5.3.1'
    testImplementation 'org.mockito.kotlin:mockito-kotlin:5.1.0'
    // 独立 org.json（Android stub 版 toString() 返回 null，单元测试需真实实现）
    testImplementation 'org.json:json:20231013'
}
